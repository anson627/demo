apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: 2-gpu-nic-aligned
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 2
      - name: nic
        exactly:
          deviceClassName: dra.net
          count: 2
      constraints:
      - matchAttribute: "resource.kubernetes.io/pcieRoot"