apiVersion: v1
kind: Pod
metadata:
  name: dbg
  labels:
    app: dbg
spec:
  hostNetwork: true
  hostPID: true
  restartPolicy: Never
  containers:
    - name: toolbox
      image: ubuntu:22.04
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt_updated=0
          apt_update_once() {
            if [ "$apt_updated" -eq 0 ]; then
              apt-get update
              apt_updated=1
            fi
          }
          ensure_pkg() {
            local pkg="$1"
            shift || true
            if [ "$#" -eq 0 ]; then
              if dpkg -s "$pkg" >/dev/null 2>&1; then
                return 0
              fi
            else
              local missing=0
              for cmd in "$@"; do
                if ! command -v "$cmd" >/dev/null 2>&1; then
                  missing=1
                  break
                fi
              done
              if [ "$missing" -eq 0 ]; then
                return 0
              fi
            fi
            apt_update_once
            if ! apt-get install -y --no-install-recommends "$pkg"; then
              return 1
            fi
          }
          detect_nvidia_pkg() {
            if [ -n "${NVIDIA_UTILS_PACKAGE:-}" ]; then
              printf '%s\n' "$NVIDIA_UTILS_PACKAGE"
              return
            fi
            if [ -r /proc/driver/nvidia/version ]; then
              driver_line=$(grep -m1 -oE '[0-9]+\.[0-9]+\.[0-9]+' /proc/driver/nvidia/version || true)
              if [ -n "$driver_line" ]; then
                printf 'nvidia-utils-%s\n' "${driver_line%%.*}"
                return
              fi
            fi
            printf 'nvidia-utils-535\n'
          }
          ensure_pkg iproute2 ip
          ensure_pkg net-tools ifconfig
          ensure_pkg dnsutils nslookup dig
          ensure_pkg ethtool ethtool
          ensure_pkg pciutils lspci
          ensure_pkg infiniband-diags ibstat
          nvidia_pkg=$(detect_nvidia_pkg)
          if ! ensure_pkg "$nvidia_pkg" nvidia-smi; then
            echo "Failed to install $nvidia_pkg; nvidia-smi may be unavailable." >&2
          fi
          if [ "$apt_updated" -eq 1 ]; then
            rm -rf /var/lib/apt/lists/*
          fi
          sleep infinity
      securityContext:
        privileged: true
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: true
        capabilities:
          add:
            - SYS_MODULE
            - NET_ADMIN
            - SYS_RAWIO
            - SYS_ADMIN
            - IPC_LOCK
            - NET_RAW
            - SYS_PTRACE
