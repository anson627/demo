apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpu-nic-aligned
spec:
  spec:
    devices:
      requests:
      - name: gpu-0
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 2
      - name: nic-0
        exactly:
          deviceClassName: dranet.net
          count: 2
      - name: gpu-1
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 2
      - name: nic-1
        exactly:
          deviceClassName: dranet.net
          count: 2
      - name: gpu-2
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 2
      - name: nic-2
        exactly:
          deviceClassName: dranet.net
          count: 2
      - name: gpu-3
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 2
      - name: nic-3
        exactly:
          deviceClassName: dranet.net
          count: 2
      constraints:
      - matchAttribute: resource.kubernetes.io/pcieRoot
        requests:
        - gpu-0
        - nic-0
      - matchAttribute: resource.kubernetes.io/pcieRoot
        requests:
        - gpu-1
        - nic-1
      - matchAttribute: resource.kubernetes.io/pcieRoot
        requests:
        - gpu-2
        - nic-2
      - matchAttribute: resource.kubernetes.io/pcieRoot
        requests:
        - gpu-3
        - nic-3
