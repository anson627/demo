apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-statefulset
  labels:
    app: nginx
spec:
  serviceName: nginx-statefulset
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccount: prometheus-k8s
      serviceAccountName: prometheus-k8s
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
