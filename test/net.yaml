apiVersion: v1
kind: Pod
metadata:
  name: netperf 
  labels:
    app: netperf 
spec:
      serviceAccountName: clusteradmin 
      restartPolicy: Never
      containers:
      - name: netperf 
        image: largeclustere2e.azurecr.io/test/netperf:v0.0.3
        command: [ "/bin/bash", "-c", "--" ]
        args: [ "while true; do sleep 30; done;" ]
        env:
        - name: ITERATIONS 
          value: "1"
