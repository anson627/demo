{{- range $i := until (int .Values.podCount) }}
---
apiVersion: v1
kind: Pod
metadata:
  name: kwok-{{ $i }}
  labels:
    app: fake-pod
spec:
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: type
            operator: In
            values:
            - kwok
  tolerations:
  - key: "kwok.x-k8s.io/node"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
  - name: fake-container
    image: fake-iamge
    resources:
      requests:
        nvidia.com/gpu: 1
      limits:
        nvidia.com/gpu: 1
{{- end }}
