kind: KwokctlConfiguration
apiVersion: config.kwok.x-k8s.io/v1alpha1
componentsPatches:
  - name: kwok-controller
    extraEnvs:
      - name: "GOMAXPROCS"
        value: "32"
  - name: etcd
    extraEnvs:
      - name: "GOMAXPROCS"
        value: "32"
  - name: kube-apiserver
    extraArgs:
    - key: max-requests-inflight
      value: "10000"
    - key: max-mutating-requests-inflight
      value: "5000"
    extraEnvs:
      - name: "GOMAXPROCS"
        value: "32"
  - name: kube-scheduler
    extraEnvs:
      - name: "GOMAXPROCS"
        value: "32"
  - name: kube-controller-manager
    extraArgs:
      - key: concurrent-job-syncs
        value: "700"
      - key: kube-api-qps
        value: "2000"
      - key: kube-api-burst
        value: "4000"
    extraEnvs:
      - name: "GOMAXPROCS"
        value: "32"